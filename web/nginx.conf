# Static site + reverse proxy to the FastAPI backend (uvicorn @ :8000).
# Mirrors the COA-builder pattern: nginx handles TLS-terminated traffic
# from Traefik, serves the SPA assets, and forwards /proxy/* to the
# Python service running inside the same container.

server {
    listen 80;
    server_name _;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self'; connect-src 'self'; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; worker-src 'self' blob:;" always;

    # ---- Compression for text assets ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml application/xml;
    gzip_min_length 1024;

    # ---- Static site ----
    location / {
        root /app/site;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        root /app/site;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }
    location /lib/ {
        root /app/site;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }
    location /data/ {
        root /app/site;
        add_header Cache-Control "public, max-age=300" always;
    }

    # ---- API proxy → FastAPI backend ----
    # nginx preserves the /proxy/ prefix so the FastAPI routes
    # match (their decorators are also /proxy/...).
    location /proxy/ {
        proxy_pass http://127.0.0.1:8000/proxy/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ---- Health check ----
    location = /healthz {
        access_log off;
        add_header Content-Type "text/plain";
        return 200 "ok\n";
    }
}
