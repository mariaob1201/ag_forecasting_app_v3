# Deploy config that follows the COA-builder Traefik pattern.
#
# Customize three things before deploying:
#   1. Replace `moros-ag-forecasting-web` with a router name unique to
#      your Traefik instance (the existing convention is
#      `<username>-<project>-web`).
#   2. Replace the Host(...) value with your real public hostname.
#   3. Make sure `traefik_network` (the external network Traefik
#      listens on) exists on the VM — if not:
#          docker network create traefik_network
#   4. `myresolver` must match the certresolver name configured on
#      your Traefik instance (often `letsencrypt`).
#
# Daily data refresh:  cron'd `cd web && docker compose up -d --build`
# on the host. The Dockerfile re-runs build_site.py at build time,
# baking fresh disease + biomass + weather snapshots into the image.

services:
  web:
    # Build context is the repo root so the image can pull in shared code
    # (features/, assets/) that the Streamlit app also uses. The Dockerfile
    # itself lives next to this file in web/.
    build:
      context: ..
      dockerfile: web/Dockerfile
    image: ag-forecasting-web:latest
    container_name: ag-forecasting-web
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.moros-ag-forecasting-web.rule=Host(`ag-forecasting.services.dsi.wisc.edu`)"
      - "traefik.http.routers.moros-ag-forecasting-web.entrypoints=websecure"
      - "traefik.http.routers.moros-ag-forecasting-web.tls=true"
      - "traefik.http.routers.moros-ag-forecasting-web.tls.certresolver=myresolver"
      - "traefik.http.services.moros-ag-forecasting-web.loadbalancer.server.port=80"
    networks:
      - traefik_network

networks:
  traefik_network:
    external: true
