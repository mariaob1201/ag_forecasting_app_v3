name: Build site data

on:
  schedule:
    # Run daily at 04:00 UTC. Adjust to taste.
    - cron: "0 4 * * *"
  workflow_dispatch:        # allow manual runs from the Actions tab
  push:
    paths:
      - "web/build_site.py"
      - "web/backend/**"
      - "features/**"
      - ".github/workflows/build-data.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build snapshot
        run: python web/build_site.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/site/data/ web/site/assets/
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "site: daily build $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
